<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>마이페이지 · 레이노 카마스터 멤버십</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
/* ===== RAYNO 카마스터 멤버십 · 공통 CSS (모든 파일 동일) ===== */
:root{
  --orange:#FF6B00; --orange-d:#E05F00; --ink:#111111; --muted:#8A8A8E;
  --line:#E5E5E7; --surface:#F5F5F5; --surface2:#F7F7F8; --ok:#2E7D46; --err:#C0403A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
html,body{height:100%;}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;letter-spacing:-.2px;color:var(--ink);background:#e9e9ec;}
img{display:block;}
a{color:var(--orange);text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input{font-family:inherit;}
input::placeholder{color:#B4B4B8;}

.app{max-width:430px;margin:0 auto;min-height:100dvh;background:#F4F4F5;position:relative;overflow:hidden;}
@media(min-width:480px){.app{box-shadow:0 20px 60px rgba(0,0,0,.14);}}

.screen{display:none;flex-direction:column;min-height:100dvh;}
.screen.active{display:flex;}
.scroll{flex:1;}
.pad{padding:0 24px;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 22px 4px;}
.back{font-size:24px;color:var(--ink);line-height:1;}
.topbar .logo{height:13px;width:auto;object-fit:contain;}

.hero{background:var(--orange);color:#fff;text-align:center;padding:66px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.hero .logo{height:30px;width:auto;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.12));}
.hero h1{margin-top:24px;font-size:31px;font-weight:800;letter-spacing:-.6px;line-height:1.28;}
.hero .en{margin-top:16px;font-size:11px;font-weight:800;letter-spacing:2.5px;color:rgba(255,255,255,.9);}

.lead{font-size:18px;font-weight:700;letter-spacing:-.3px;}
.body{font-size:15px;line-height:1.72;color:#5A5A5E;}
.h-title{font-size:26px;font-weight:800;letter-spacing:-.4px;}
.h-sub{font-size:13px;line-height:1.55;color:var(--muted);}

.pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,107,0,.10);color:var(--orange);font-size:12.5px;font-weight:800;padding:7px 13px;border-radius:999px;letter-spacing:.3px;}

.btn{width:100%;padding:17px 0;border-radius:14px;font-size:16px;font-weight:800;text-align:center;}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:disabled{background:#E5E5E7;color:#B0B0B4;cursor:not-allowed;}
.btn-outline{background:#fff;color:var(--ink);border:1.5px solid var(--ink);font-weight:700;}
.btn-ghost{background:none;color:var(--muted);font-weight:600;padding:13px 0;}
.btn-dark{background:var(--ink);color:#fff;}
.btn-line{background:#fff;color:var(--ink);border:1.5px solid var(--line);font-weight:700;}
.btn-sm{padding:0 16px;border-radius:12px;font-size:13px;font-weight:700;}
.row{display:flex;gap:10px;}

.cta{position:sticky;bottom:0;background:#fff;padding:16px 20px 28px;border-top:1px solid #F2F2F2;}
.cta.no-line{border-top:none;}
.note{font-size:11.5px;line-height:1.5;color:#A0A0A4;text-align:center;}
.err-note{font-size:11.5px;color:var(--err);text-align:center;margin-top:10px;}

.steps{display:flex;gap:6px;}
.steps .seg{flex:1;height:5px;border-radius:3px;background:var(--line);}
.steps .seg.on{background:var(--orange);}
.steplabels{display:flex;margin-top:8px;font-size:11px;font-weight:700;text-align:center;}
.steplabels span{flex:1;color:#B0B0B4;}
.steplabels span.on{color:var(--orange);}

.section-title{font-size:13px;font-weight:800;margin:0 0 10px;}
.field{display:flex;flex-direction:column;gap:10px;}
.input,.select{width:100%;padding:15px 16px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;color:var(--ink);background:#fff;outline:none;}
.input:focus,.select:focus{border-color:var(--ink);}
.input.error{border-color:var(--err);}
.select{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%238A8A8E' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 16px center;padding-right:38px;}
.select:disabled{background:var(--surface2);color:#C4C4C8;border-color:#EDEDED;cursor:not-allowed;}
.select.placeholder{color:#A0A0A4;}
.hint{font-size:11.5px;line-height:1.5;color:#B0B0B4;padding-left:2px;}
.field-row{display:flex;gap:8px;}
.field-row .input{flex:1;}
.field-row .btn-sm{flex-shrink:0;}
.msg-ok{font-size:11.5px;color:var(--ok);font-weight:600;padding-left:2px;}
.msg-err{font-size:11.5px;color:var(--err);font-weight:600;padding-left:2px;}
.code-box{display:flex;gap:8px;}
.code-inp{flex:1;padding:15px 16px;border:1.5px solid var(--orange);border-radius:12px;display:flex;justify-content:space-between;align-items:center;}
.code-inp input{border:none;outline:none;font-size:15px;color:var(--ink);width:70%;background:none;}
.code-inp .timer{font-size:13px;font-weight:700;color:var(--orange);}
.verified{padding:15px 16px;border:1.5px solid var(--ok);background:rgba(46,125,70,.06);border-radius:12px;display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;color:var(--ok);}
.dot-ok{width:22px;height:22px;border-radius:50%;background:var(--ok);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.agree{border:1.5px solid #EEE;border-radius:14px;overflow:hidden;}
.agree .all{padding:15px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #F0F0F0;}
.agree .all .t{font-size:15px;font-weight:800;}
.agree .items{padding:4px 16px 8px;}
.agree .item{padding:11px 0;display:flex;align-items:center;gap:12px;}
.agree .item .t{font-size:14px;color:var(--ink);font-weight:500;}
.agree .item.opt .t{color:var(--muted);}
.agree .req{color:var(--orange);font-weight:700;}
.agree .more{margin-left:auto;font-size:12.5px;color:var(--muted);}
.chk{width:22px;height:22px;border-radius:6px;border:2px solid #D0D0D4;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;background:#fff;}
.chk.sm{width:20px;height:20px;font-size:12px;}
.chk.on{background:var(--ink);border-color:var(--ink);}
.chk .mk{display:none;}
.chk.on .mk{display:block;}

.voucher{background:var(--ink);border-radius:20px;padding:26px 24px;color:#fff;position:relative;overflow:hidden;box-shadow:0 14px 30px rgba(17,17,17,.28);}
.voucher .vbar{position:absolute;top:0;left:0;right:0;height:6px;background:var(--orange);}
.voucher .vglow{position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,107,0,.14);}
.voucher .vtop{display:flex;align-items:center;gap:8px;margin-top:8px;}
.voucher .mono{font-family:'SF Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:3px;color:var(--orange);}
.voucher .pct{font-size:11px;font-weight:800;color:var(--ink);background:var(--orange);padding:2px 7px;border-radius:5px;}
.voucher .vlabel{font-size:19px;font-weight:700;margin-top:24px;}
.voucher .vamount{font-size:44px;font-weight:800;margin-top:2px;letter-spacing:-1px;}
.voucher .vamount span{font-size:22px;font-weight:600;}
.voucher .vfoot{margin-top:22px;border-top:1px dashed rgba(255,255,255,.22);padding-top:14px;display:flex;justify-content:space-between;align-items:center;}
.voucher .vfoot img{height:11px;width:auto;object-fit:contain;opacity:.85;}
.voucher .vfoot span{font-size:12px;font-weight:600;color:#9A9A9E;}

.teaser{border:1.5px dashed #E0E0E4;border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px;}
.teaser .tb{width:44px;height:44px;border-radius:12px;background:rgba(255,107,0,.10);color:var(--orange);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:.5px;}
.teaser .tsub{font-size:11.5px;font-weight:700;color:var(--muted);}
.teaser .tmain{font-size:14.5px;font-weight:700;margin-top:3px;line-height:1.4;}
.teaser .tmain span{color:var(--orange);}

.spinner{width:52px;height:52px;border:4px solid #F0F0F0;border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 40px;}

.done{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:24px 24px 0;}
.done .logo{height:15px;width:auto;object-fit:contain;margin-bottom:22px;opacity:.9;}
.check{width:72px;height:72px;border-radius:50%;background:var(--orange);color:#fff;font-size:36px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(255,107,0,.35);}
.done-name{margin-top:22px;font-size:34px;font-weight:800;letter-spacing:-.4px;line-height:1.28;}
.banner{width:100%;background:var(--orange);color:#fff;border-radius:16px;padding:20px 18px;box-shadow:0 12px 28px rgba(255,107,0,.28);text-align:center;}
.banner .b1{font-size:19px;font-weight:800;line-height:1.45;}
.banner .b2{margin-top:8px;font-size:12.5px;line-height:1.5;color:rgba(255,255,255,.85);}
.gift{width:100%;background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:13px;text-align:left;}
.gift .g{width:38px;height:38px;border-radius:10px;background:var(--ink);color:var(--orange);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.gift .t{font-size:13.5px;line-height:1.6;color:#3A3A3E;font-weight:500;}
.notes{font-size:11.5px;line-height:1.85;color:#A0A0A4;text-align:left;width:100%;}

.my-head{background:#fff;padding:14px 22px 20px;}
.my-top{display:flex;align-items:center;justify-content:space-between;}
.my-top .logo{height:14px;width:auto;object-fit:contain;}
.my-top .menu{width:32px;height:32px;border-radius:50%;background:#F2F2F2;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--muted);}
.profile{margin-top:18px;display:flex;align-items:center;gap:13px;}
.avatar{width:50px;height:50px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;}
.profile .nm{font-size:19px;font-weight:800;}
.profile .of{font-size:13px;color:var(--muted);margin-top:2px;}
.card{background:#fff;border-radius:16px;}
.stats{padding:18px 12px;display:flex;}
.stats .st{flex:1;text-align:center;}
.stats .lbl{font-size:12.5px;color:var(--muted);font-weight:600;}
.stats .val{font-size:30px;font-weight:800;margin-top:4px;}
.stats .val span{font-size:15px;font-weight:600;color:var(--muted);}
.stats .div{width:1px;background:#EFEFEF;}
.prog{padding:22px 20px;}
.prog .top{display:flex;align-items:center;gap:8px;}
.prog .ic{width:26px;height:26px;border-radius:8px;background:rgba(255,107,0,.10);color:var(--orange);font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.prog .cap{font-size:13px;font-weight:700;color:var(--muted);}
.prog .big{display:flex;align-items:baseline;gap:6px;margin-top:12px;}
.prog .big b{font-size:56px;font-weight:800;color:var(--orange);line-height:.9;letter-spacing:-2px;}
.prog .big em{font-size:21px;font-weight:800;font-style:normal;}
.prog .goal{margin-top:8px;font-size:14px;color:#3A3A3E;font-weight:600;}
.ptrack{margin-top:18px;height:12px;background:#EDEDED;border-radius:6px;overflow:hidden;}
.pfill{height:100%;background:var(--orange);border-radius:6px;width:0;transition:width .6s;}
.plabel{margin-top:9px;display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-weight:700;}
.plabel .cur{color:var(--orange);}
.codecard{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;}
.codecard .lbl{font-size:12px;color:var(--muted);font-weight:600;}
.codecard .code{font-size:18px;font-weight:800;letter-spacing:1px;margin-top:3px;}
.menu-row{padding:17px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F2F2F2;}
.menu-row:last-child{border-bottom:none;}
.menu-row .t{font-size:15px;font-weight:600;}
.menu-row .r{display:flex;align-items:center;gap:8px;}
.menu-badge{background:rgba(255,107,0,.10);color:var(--orange);font-size:12px;font-weight:800;padding:3px 9px;border-radius:6px;}
.menu-row .chev{color:#C4C4C8;font-size:18px;}

.overlay{position:fixed;inset:0;background:rgba(17,17,17,.5);z-index:40;display:none;}
.overlay.on{display:block;}
.sheet{position:fixed;left:50%;transform:translateX(-50%) translateY(100%);bottom:0;width:100%;max-width:430px;background:#fff;border-radius:24px 24px 0 0;z-index:50;box-shadow:0 -12px 40px rgba(0,0,0,.18);display:flex;flex-direction:column;max-height:82dvh;transition:transform .28s ease;}
.sheet.on{transform:translateX(-50%) translateY(0);}
.sheet .grab{width:44px;height:5px;border-radius:3px;background:#E0E0E4;margin:12px auto 4px;}
.sheet .head{padding:10px 24px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #F0F0F0;}
.sheet .head .t{font-size:17px;font-weight:800;}
.sheet .x{width:30px;height:30px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);}
.sheet .bd{padding:20px 24px;overflow:auto;font-size:13.5px;line-height:1.85;color:#4A4A4E;}
.sheet .bd b{color:var(--ink);}
.sheet .ft{padding:14px 20px 22px;border-top:1px solid #F0F0F0;}

.toast{position:fixed;left:50%;bottom:40px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:12px 20px;border-radius:12px;opacity:0;pointer-events:none;transition:.25s;z-index:60;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <section class="screen active">
    <div class="my-head">
      <div class="my-top">
        <img class="logo" src="assets/rayno-logo-dark.png" alt="RAYNO">
        <div class="menu" id="menuBtn">≡</div>
      </div>
      <div class="profile">
        <div class="avatar" id="avatar">홍</div>
        <div>
          <div class="nm" id="userName">홍길동 카마스터님</div>
          <div class="of" id="userOffice">현대 · 광교대리점</div>
        </div>
      </div>
    </div>

    <div class="scroll" style="padding:16px 20px 24px;display:flex;flex-direction:column;gap:12px;">
      <!-- 시공 통계 -->
      <div class="card stats">
        <div class="st">
          <div class="lbl">이번 달 시공</div>
          <div class="val"><span id="monthCount">0</span><span> 건</span></div>
        </div>
        <div class="div"></div>
        <div class="st">
          <div class="lbl">누적 시공</div>
          <div class="val"><span id="totalCount">0</span><span> 건</span></div>
        </div>
      </div>

      <!-- 다음 리워드 진행 -->
      <div class="card prog">
        <div class="top"><span class="ic" id="goalIc">10</span><span class="cap">다음 리워드까지</span></div>
        <div class="big"><b id="remain">0</b><em>건 남았어요</em></div>
        <div class="goal">유리막 코팅 무료 쿠폰까지</div>
        <div class="ptrack"><div class="pfill" id="pfill"></div></div>
        <div class="plabel"><span class="cur" id="progLabel">0 / 10 건</span><span id="goalLabel">목표 10건</span></div>
      </div>

      <!-- 카마스터 코드 -->
      <div class="card codecard">
        <div>
          <div class="lbl">내 카마스터 코드</div>
          <div class="code" id="cmCode">CM-0000</div>
        </div>
        <button class="btn-line btn-sm" id="copyBtn" style="padding:10px 18px;">복사</button>
      </div>

      <!-- 메뉴 -->
      <div class="card">
        <div class="menu-row" data-page="coupons">
          <span class="t">내 쿠폰</span>
          <span class="r"><span class="menu-badge" id="couponBadge">0장</span><span class="chev">›</span></span>
        </div>
        <div class="menu-row" data-page="services">
          <span class="t">시공 내역</span><span class="chev">›</span>
        </div>
        <div class="menu-row" data-page="rewards">
          <span class="t">리워드 내역</span><span class="chev">›</span>
        </div>
      </div>
    </div>
  </section>
</div>
<div class="toast" id="toast"></div>

<script>
/* ─────────────────────────────────────────────
   RAYNO 카마스터 멤버십 · my.html (마이페이지)
   ───────────────────────────────────────────── */
const S = { stats:null };
const $ = id => document.getElementById(id);
let toastT; function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),1800);}

/* ── 백엔드 연동 예정 (지금은 샘플) ── */
async function loadMyStats() {
  /* → { month_count, total_count, code, name, office, reward_goal, reward_progress, coupons } */
  // TODO: return await (await fetch('/api/my')).json();
  return { month_count:3, total_count:17, code:'CM-4821', name:'홍길동', office:'현대 · 광교대리점', reward_goal:10, reward_progress:7, coupons:1 };
}

async function init(){
  const d = await loadMyStats();
  S.stats = d;
  if(d.name){ $('userName').textContent = d.name + ' 카마스터님'; $('avatar').textContent = d.name.charAt(0); }
  if(d.office) $('userOffice').textContent = d.office;
  $('monthCount').textContent = d.month_count ?? 0;
  $('totalCount').textContent = d.total_count ?? 0;
  $('cmCode').textContent = d.code || 'CM-0000';

  const goal = d.reward_goal ?? 10;
  const prog = d.reward_progress ?? 0;
  const remain = Math.max(goal - prog, 0);
  $('goalIc').textContent = goal;
  $('remain').textContent = remain;
  $('progLabel').textContent = prog + ' / ' + goal + ' 건';
  $('goalLabel').textContent = '목표 ' + goal + '건';
  requestAnimationFrame(()=>{ $('pfill').style.width = Math.min(prog/goal*100, 100) + '%'; });

  $('couponBadge').textContent = (d.coupons ?? 0) + '장';
}

/* 코드 복사 */
$('copyBtn').addEventListener('click', async ()=>{
  const code = S.stats?.code || $('cmCode').textContent;
  try { await navigator.clipboard.writeText(code); toast('카마스터 코드를 복사했습니다.'); }
  catch(e){ toast(code); }
});

/* 메뉴 (하위 페이지는 추후 연결) */
document.querySelectorAll('.menu-row').forEach(row=>{
  row.addEventListener('click', ()=>{
    const page = row.dataset.page;
    // TODO: location.href = page + '.html';
    toast('준비 중입니다: ' + row.querySelector('.t').textContent);
  });
});
$('menuBtn').addEventListener('click', ()=> toast('메뉴 준비 중입니다.'));

init();
</script>
</body>
</html>
