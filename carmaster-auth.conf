log_format privacy_safe '$remote_addr $request_method $uri $status $request_time';

server {
    listen 80;
    listen [::]:80;
    server_name carmaster-auth.raynofilm.co.kr;

    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name carmaster-auth.raynofilm.co.kr;

    ssl_certificate     /etc/letsencrypt/live/carmaster-auth.raynofilm.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carmaster-auth.raynofilm.co.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 개인정보 보호: 쿼리스트링을 기록하지 않는다
    access_log /var/log/nginx/carmaster-auth.access.log privacy_safe;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 64k;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
