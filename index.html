<script>
(function(){
  var app=document.getElementById('app');
  var screens=[document.getElementById('screen-onboarding'),document.getElementById('screen-benefit')];
  var cur=0, animating=false;
  function show(to,dir){
    if(animating||to===cur||!screens[to])return;
    animating=true;
    var out=screens[cur], inc=screens[to];
    inc.style.transition='none';
    inc.style.transform='translateX('+(dir>0?100:-100)+'%)';
    inc.style.opacity='1'; inc.classList.add('on'); inc.getBoundingClientRect();
    requestAnimationFrame(function(){
      var t='transform .44s cubic-bezier(.4,0,.2,1),opacity .34s ease';
      inc.style.transition=t; out.style.transition=t;
      inc.style.transform='translateX(0)';
      out.style.transform='translateX('+(dir>0?-24:24)+'%)'; out.style.opacity='0';
    });
    setTimeout(function(){
      out.classList.remove('on');
      out.style.transform=''; out.style.opacity=''; out.style.transition='';
      inc.style.transition='';
      cur=to; animating=false;
      inc.querySelector('.screen>div, div').scrollTop=0;
    },470);
  }
  // 화면 라우팅 핸들러 (실제 클릭 시 호출됨)
  window.goBenefit    = function(){ show(1, 1); };
  window.goOnboarding = function(){ show(0,-1); };
  window.goLogin      = function(){ location.href='login.html'; };
  window.goSignup     = function(){ location.href='signup.html'; };
})();
