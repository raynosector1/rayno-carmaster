<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>가입 신청 · 레이노 카마스터 멤버십</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{font-family:'Pretendard',-apple-system,sans-serif;letter-spacing:-.3px;color:#111;background:#fff}
a{color:#FF5A00;text-decoration:none}a:hover{color:#E0500A}
img{display:block}
button{font-family:inherit;cursor:pointer}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;padding:0 22px}
.top{display:flex;align-items:center;gap:12px;padding:16px 0 4px}
.back{width:38px;height:38px;border-radius:50%;background:#F2F2F4;border:none;font-size:19px;color:#111}
.ttl{font-size:20px;font-weight:800}
.h1{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1.18}
.h1.big{font-size:34px}
.sub{font-size:15px;line-height:1.6;color:#8A8A8E;margin-top:10px}
.muted{color:#8A8A8E}
.grow{flex:1}
.lbl{font-size:14px;font-weight:800;margin:18px 0 8px}
.inp,.sel{width:100%;border:1.5px solid #E7E7E9;border-radius:14px;padding:16px;font-size:16px;color:#111;font-family:inherit;background:#fff;outline:none}
.inp:focus,.sel:focus{border-color:#111}
.inp:disabled,.sel:disabled{background:#F5F5F6;color:#B4B4B8;border-color:#EDEDED}
.inp::placeholder{color:#B4B4B8}
select.sel{-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2712%27 height=%2712%27 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%23111%27 stroke-width=%272%27%3E%3Cpath d=%27M6 9l6 6 6-6%27/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 16px center}
select.sel:disabled{background-image:url("data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2712%27 height=%2712%27 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%23C4C4C8%27 stroke-width=%272%27%3E%3Cpath d=%27M6 9l6 6 6-6%27/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 16px center}
.row{display:flex;gap:8px}.row .inp{flex:1}
.pwwrap{position:relative}.pwwrap .inp{padding-right:50px}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;padding:8px;line-height:0}
.btn{width:100%;padding:18px 0;border:none;border-radius:999px;background:#111;color:#fff;font-size:17px;font-weight:800;font-family:inherit}
.btn:disabled{background:#EAEAEC;color:#B4B4B8;cursor:default}
.btn-line{background:#fff;color:#111;border:1.5px solid #111}
.btn-sm{flex-shrink:0;width:auto;padding:0 16px;font-size:13px;border-radius:14px;background:#111;color:#fff;border:none;font-weight:700}
.btn-sm.done{background:#111}
.foot{padding:14px 0 26px}
.center{text-align:center}
.link{color:#111;font-weight:800;text-decoration:underline}
.prog{display:flex;gap:8px;margin-top:18px}.seg{flex:1;height:4px;border-radius:2px;background:#EAEAEC}.seg.on{background:#111}
.step{font-size:12px;font-weight:700;color:#8A8A8E;margin-top:8px}
.screen{display:none;flex-direction:column;flex:1}.screen.on{display:flex}
.accent{color:#FF5A00}
.note{font-size:11.5px;line-height:1.7;color:#A8A8AC;margin-top:16px}
.chk-circle{width:76px;height:76px;border-radius:50%;background:#FF5A00;display:flex;align-items:center;justify-content:center;color:#fff;font-size:38px;font-weight:800;margin:0 auto}
.result{background:#F5F5F6;border-radius:16px;padding:18px 20px;margin-top:20px}
.voucher{margin-top:18px}.voucher img{width:72%;margin:0 auto;filter:drop-shadow(0 12px 26px rgba(0,0,0,.16))}
.bcard{background:#F5F5F6;border-radius:18px;padding:18px 20px;margin-top:22px}
.bitem{display:flex;align-items:center;gap:14px;padding:14px 0;border-top:1px solid #EFEFF1}
.ic{width:32px;height:32px;border-radius:50%;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.ic.soon{border-radius:9px;background:#FF5A00;font-size:9px;letter-spacing:.3px}
.tag{font-size:10px;font-weight:800;color:#FF5A00;background:rgba(255,90,0,.12);padding:2px 7px;border-radius:999px;margin-left:6px}
.agree{border:1.5px solid #EDEDEF;border-radius:16px;overflow:hidden;margin-top:20px}
.agree .all{padding:15px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #F2F2F4;font-weight:800;font-size:15px}
.agree .it{padding:11px 16px;display:flex;align-items:center;gap:12px;font-size:14px}
.agree .it .ex{margin-left:auto;color:#B0B0B4;font-size:12px}
.agree input{width:20px;height:20px;accent-color:#111;flex-shrink:0}
.agree .all input{width:22px;height:22px}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#111;color:#fff;font-size:13px;font-weight:600;padding:11px 18px;border-radius:999px;z-index:99;opacity:0;transition:.25s;white-space:nowrap;pointer-events:none}.toast.on{opacity:1}
.spin{width:56px;height:56px;border:4px solid #F1F1F3;border-top-color:#FF5A00;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto}@keyframes sp{to{transform:rotate(360deg)}}
.collage{position:relative;flex:1;min-height:320px;margin:0 -22px;overflow:hidden;background:#EDEDF0}
.collage .grid{position:absolute;top:-40px;left:-20px;right:-20px;transform:rotate(-9deg);display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.collage .col{display:flex;flex-direction:column;gap:10px}.collage .col.mid{padding-top:0}.collage .col.side{padding-top:36px}
.collage .cell{border-radius:16px;overflow:hidden}.collage .cell img{width:100%;height:100%;object-fit:cover}
.collage .fade{position:absolute;left:0;right:0;bottom:0;height:110px;background:linear-gradient(180deg,rgba(237,237,240,0),#fff)}
.navbar{position:sticky;bottom:0;margin:0 -22px;background:#fff;border-top:1px solid #EEE;display:flex;justify-content:space-around;padding:10px 0 22px}
.navbar button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;color:#B0B0B4;padding:6px 14px;border-radius:12px}
.navbar button.on{color:#FF5A00}
.homecard{background:#F5F5F6;border-radius:20px;padding:18px 20px;margin-top:20px}
.bar{height:10px;background:#E4E4E7;border-radius:5px;overflow:hidden;margin-top:12px}.bar>div{height:100%;background:#FF5A00;border-radius:5px}
.tiles{display:flex;gap:12px;margin-top:12px}.tile{flex:1;border:1.5px solid #EDEDEF;border-radius:16px;padding:16px}
</style>
</head>
<body>
<div class="wrap">
<div id="step1" class="screen on">
<div class="top"><button class="back" id="back">‹</button><span class="ttl">가입 신청</span></div><div class="prog"><div class="seg" id="asg1"></div><div class="seg" id="asg2"></div><div class="seg" id="asg3"></div></div><div class="step" id="astep"></div>  <div class="lbl">소속 정보</div>
  <select id="brand" class="sel"><option value="" disabled selected>소속 선택</option></select>
  <input id="brandEtc" class="inp" placeholder="소속 직접 입력 (최대 20자)" maxlength="20" style="display:none;margin-top:10px">
  <select id="region" class="sel" style="margin-top:10px" disabled><option value="" disabled selected>지역 선택 (시·도)</option></select>
  <select id="office" class="sel" style="margin-top:10px" disabled><option value="" disabled selected>영업소 선택</option></select>
  <input id="officeEtc" class="inp" placeholder="영업소 직접 입력 (최대 20자)" maxlength="20" style="display:none;margin-top:10px">
  <div class="lbl">개인 정보</div>
  <input id="name" class="inp" placeholder="이름을 입력해 주세요">
  <input id="birth" class="inp" type="tel" inputmode="numeric" maxlength="8" placeholder="생년월일 8자리 (예: 19900101)" style="margin-top:10px">
  <div class="grow"></div>
  <div class="foot"><button id="next1" class="btn" disabled>다음</button></div>
</div>
<div id="step2" class="screen">
<div class="top"><button class="back" id="back2">‹</button><span class="ttl">가입 신청</span></div><div class="prog"><div class="seg" id="bsg1"></div><div class="seg" id="bsg2"></div><div class="seg" id="bsg3"></div></div><div class="step" id="bstep"></div>  <h2 class="h1" style="font-size:22px;margin-top:20px;line-height:1.35">본인 확인은 <span class="accent">필수</span>예요<br>휴대폰으로 인증해 주세요</h2>
  <label class="lbl" for="telco">통신사</label><select id="telco" class="sel"><option value="" disabled selected>통신사 선택</option><option>SKT</option><option>KT</option><option>LG U+</option><option>알뜰폰</option></select>
  <label class="lbl" for="phone">휴대폰번호</label><div class="row"><input id="phone" class="inp" type="tel" inputmode="numeric" placeholder="숫자만 입력"><button id="reqCode" class="btn-sm">인증요청</button></div>
  <div id="codeWrap" style="display:none"><label class="lbl" for="code">인증번호</label><div class="row"><input id="code" class="inp" type="tel" inputmode="numeric" maxlength="6" placeholder="6자리"><button id="confirmCode" class="btn-sm btn-line" style="color:#111">확인</button></div></div>
  <div class="grow"></div>
  <div class="foot"><button id="next2" class="btn" disabled>다음</button></div>
</div>
<div id="step3" class="screen">
<div class="top"><button class="back" id="back3">‹</button><span class="ttl">가입 신청</span></div><div class="prog"><div class="seg" id="csg1"></div><div class="seg" id="csg2"></div><div class="seg" id="csg3"></div></div><div class="step" id="cstep"></div>  <label class="lbl" for="loginId">아이디</label><div class="row"><input id="loginId" class="inp" placeholder="아이디" autocomplete="username"><button id="dupCheck" class="btn-sm btn-line" style="color:#111">중복확인</button></div>
  <label class="lbl" for="password">비밀번호</label><div class="pwwrap"><input id="password" class="inp" type="password" placeholder="8자 이상" autocomplete="new-password"><button class="eye" type="button" data-eye><svg data-off viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#8A8A8E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg><svg data-on style="display:none" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#FF5A00" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle><path d="M3 3 L21 21"></path></svg></button></div>
  <label class="lbl" for="password2">비밀번호 확인</label><input id="password2" class="inp" type="password" placeholder="비밀번호 확인" autocomplete="new-password">
  <div class="agree"><label class="all"><input type="checkbox" id="agreeAll">전체 동의</label><div><label class="it"><input type="checkbox" id="agree1">개인정보 수집·이용 <b class="accent">(필수)</b><a class="ex" data-terms="개인정보 수집·이용 동의">전문</a></label><label class="it"><input type="checkbox" id="agree2">개인정보 취급 위탁 <b class="accent">(필수)</b><a class="ex" data-terms="개인정보 취급 위탁 동의">전문</a></label><label class="it"><input type="checkbox" id="agree3"><span class="muted">광고성 정보 수신 (선택)</span><a class="ex" data-terms="광고성 정보 수신 동의">전문</a></label></div></div>
  <div class="grow"></div>
  <div class="foot"><button id="submit" class="btn" disabled>가입 완료</button></div>
</div>
<div id="loading" class="screen"><div class="grow" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center"><div class="spin"></div><div style="margin-top:26px;font-size:19px;font-weight:800">가입을 처리하고 있어요</div><div class="sub">입력하신 정보를 확인하고<br>멤버십 가입을 완료하고 있어요.</div></div></div>

var FN=SB_URL+'/functions/v1/carmaster-auth';
var DOMAIN='carmaster.raynofilm.co.kr';
async function fn(a,b){var r=await fetch(FN,{method:'POST',headers:{'Content-Type':'application/json'},
  body:JSON.stringify(Object.assign({action:a},b||{}))});return r.json();}
async function rest(p,t){var h={apikey:SB_ANON};if(t)h.Authorization='Bearer '+t;
  var r=await fetch(SB_URL+'/rest/v1/'+p,{headers:h});if(!r.ok)throw new Error(await r.text());return r.json();}
async function doLogin(id,pw){
  var r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',
    headers:{apikey:SB_ANON,'Content-Type':'application/json'},
    body:JSON.stringify({email:id.toLowerCase()+'@'+DOMAIN,password:pw})});
  var d=await r.json(); if(!r.ok||!d.access_token) return false;
  sessionStorage.setItem('cm_token',d.access_token); return true;}

var TREE=[], VTOKEN=null;
async function loadOffices(){
  var r=await fetch(SB_URL+'/rest/v1/rpc/offices_tree',{method:'POST',
    headers:{apikey:SB_ANON,'Content-Type':'application/json'},body:'{}'});
  if(!r.ok){console.error('영업점 로딩 실패');return null;}
  TREE=await r.json();
  return {brands:TREE.map(function(b){return b.name}).concat(['기타 (직접 입력)']),regions:[],offices:[]};
}
async function checkLoginId(id){ return fn('check-id',{login_id:id}); }
async function verifyIdentity(d){
  var r=await fn('verify',{name:S.name,birth:S.birth,phone:d.phone,carrier:d.telco});
  if(!r.ok) return {ok:false,message:r.message};
  VTOKEN=r.token; return {ok:true};
}
async function submitSignup(d){
  var r=await fn('signup',{token:VTOKEN,login_id:d.loginId,password:d.pw,
    brand:d.brand,region:d.region,office:d.office,
    agree_privacy:d.agreements.privacy,agree_outsourcing:d.agreements.consign,
    agree_marketing:d.agreements.marketing});
  if(r.ok){ try{ await doLogin(d.loginId,d.pw); }catch(e){} }
  return r;
}

function goStep(n){document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("on")});$("step"+n).classList.add("on");var t=["","소속·정보","본인인증","계정·약관"][n];var pre=["a","b","c"][n-1];["a","b","c"].forEach(function(p){for(var k=1;k<=3;k++){$(p+"sg"+k).classList.remove("on")}});for(var k=1;k<=n;k++){$(pre+"sg"+k).classList.add("on")}$(pre+"step").textContent="3단계 중 "+n+"단계 · "+t;window.scrollTo(0,0)}

function etcToggle(sel,etc){$(etc).style.display=($(sel).value.indexOf("기타")===0)?"block":"none"}
function refill(id,arr,ph){var e=$(id);e.innerHTML='';var o=document.createElement('option');o.value='';o.textContent=ph;e.appendChild(o);
  arr.forEach(function(v){var x=document.createElement('option');x.value=v;x.textContent=v;e.appendChild(x)});}
$("brand").onchange=function(){
  etcToggle("brand","brandEtc");
  var b=TREE.filter(function(x){return x.name===$("brand").value})[0];
  if(b){refill("region",b.regions.map(function(r){return r.name}),"지역 선택");$("region").disabled=false;}
  else{refill("region",[],"지역 선택");$("region").disabled=true;}
  refill("office",[],"영업소 선택");$("office").disabled=true;$("officeEtc").style.display="none";
  vStep1();};
$("region").onchange=function(){
  var b=TREE.filter(function(x){return x.name===$("brand").value})[0];
  var r=b&&b.regions.filter(function(x){return x.name===$("region").value})[0];
  refill("office",(r?r.offices:[]).concat(["기타 (직접 입력)"]),"영업소 선택");
  $("office").disabled=false;$("officeEtc").style.display="none";
  vStep1();};

$("confirmCode").onclick=async function(){if(($("code").value||"").length!==6){toast("인증번호 6자리를 입력해 주세요.");return}var r=await verifyIdentity({telco:$("telco").value,phone:$("phone").value,code:$("code").value});verified=!r||r.ok!==false;if(verified){$("next2").disabled=false;toast("본인인증이 완료되었습니다.")}else{toast("인증에 실패했습니다.")}};

  if(!res||res.ok===false){document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("on")});

  var c=res.carmaster||{};
